---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app lldap
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controller:
      replicas: 1
      strategy: Recreate
      annotations:
        reloader.stakater.com/auto: "true"

    image:
      repository: ghcr.io/lldap/lldap
      # TODO: Switch to release tag on next release
      tag: latest-alpine@sha256:80398ff35ab5e39d749afe25bc6dfccc08f2c5b17b622b496cfee561f25bdeab

    env:
      LLDAP_VERBOSE: "true"
      LLDAP_HTTP_URL: "https://ldap.${SECRET_DOMAIN}"
      LLDAP_HTTP_PORT: &port 80
      LLDAP_LDAP_PORT: &ldapPort 389
      LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET: "true"
      LLDAP_SMTP_OPTIONS__SERVER: "mail-relay.networking.svc.cluster.local"
      LLDAP_SMTP_OPTIONS__PORT: "25"
      LLDAP_SMTP_OPTIONS__SMTP_ENCRYPTION: "NONE"
      LLDAP_SMTP_OPTIONS__FROM: "Infrastructure <infrastructure@${SECRET_DOMAIN}>"
      LLDAP_SMTP_OPTIONS__REPLY_TO: "Do not reply <noreply@${SECRET_DOMAIN}>"

    envFrom:
      - secretRef:
          name: lldap-secrets

    service:
      main:
        ports:
          http:
            port: *port
          ldap:
            enabled: true
            port: *ldapPort

    ingress:
      main:
        enabled: true
        ingressClassName: "internal"
        annotations:
          hajimari.io/icon: icon-park-twotone:data-user
        hosts:
          - host: &host "ldap.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host

    persistence:
      data:
        enabled: true
        type: pvc
        existingClaim: data-lldap

    resources:
      requests:
        cpu: 5m
        memory: 128Mi
      limits:
        memory: 512Mi
