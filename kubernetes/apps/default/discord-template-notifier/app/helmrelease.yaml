---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: discord-template-notifier
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    service:
      main: &disableSvc
        enabled: false
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/morphy2k/rss-forwarder
              tag: 0.6.1
            env:
              TZ: "${TIMEZONE}"
            probes:
              liveness: *disableSvc
              readiness: *disableSvc
              startup: *disableSvc
            resources:
              requests:
                cpu: 15m
                memory: 110M
              limits:
                cpu: 15m
                memory: 110M
    ingress:
      main: *disableSvc
    persistence:
      data:
        enabled: true
        type: secret
        name: discord-template-notifier-secret
