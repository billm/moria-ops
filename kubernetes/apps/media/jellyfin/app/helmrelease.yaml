---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app jellyfin
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    defaultPodOptions:
      hostNetwork: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: jellyfin/jellyfin
              tag: 10.8.12
            env:
              TZ: "America/New_York"
              JELLYFIN_DATA_DIR: /jellyfin
              JELLYFIN_CONFIG_DIR: /jellyfin/config
              JELLYFIN_CACHE_DIR: /jellyfin/cache
              DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
            # resources:
            #   requests:
            #     nvidia.com/gpu: 1
            #   limits:
            #     nvidia.com/gpu: 1
    ingress:
      main:
        enabled: true
        className: "internal"
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/appName: "Jellyfin"
          hajimari.io/info: "Media library"
          hajimari.io/icon: "play-network"
          hajimari.io/targetBlank: "true"
        hosts:
          - host: &host "jellyfin.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
        tls:
          - hosts:
              - *host
    service:
      main:
        ports:
          http:
            port: 8096
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: jellyfin-data
        globalMounts:
          - path: /jellyfin
      cache:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: jellyfin-cache
        globalMounts:
          - path: /jellyfin/cache
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: jellyfin-config
        globalMounts:
          - path: /jellyfin/config
      transcode:
        type: emptyDir
        globalMounts:
          - path: /jellyfin/transcode
      movies:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: movies
        globalMounts:
          - path: /media/movies
      movies-unvalidated:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: movies-unvalidated
        globalMounts:
          - path: /media/movies-unvalidated
