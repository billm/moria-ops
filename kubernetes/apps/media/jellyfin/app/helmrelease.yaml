---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: &app jellyfin
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: amd-device-plugin
      namespace: kube-system
    - name: longhorn
      namespace: storage
  values:
    controllers:
      main:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: config
              accessMode: ReadWriteOnce
              size: 20Gi
              storageClass: longhorn
              globalMounts:
                - path: /config
        containers:
          main:
            image:
              repository: jellyfin/jellyfin
              tag: 20240207.5-unstable
              # tag: 10.8.12
            env:
              TZ: ${TIMEZONE}
              DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
              JELLYFIN_FFmpeg__probesize: 500M
              JELLYFIN_FFmpeg__analyzeduration: 250M
              JELLYFIN_PublishedServerUrl: https://jellyfin.${SECRET_DOMAIN}
              JELLYFIN_PublishedServerName: jellyfin
            resources:
              requests:
                amd.com/gpu: 1
                cpu: 1500m
                memory: 2Gi
              limits:
                amd.com/gpu: 1
                memory: 10Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
        pod:
          enableServiceLinks: false
          nodeSelector:
            amd.feature.node.kubernetes.io/gpu: "true"
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [44, 105, 10000]
    service:
      main:
        type: LoadBalancer
        externalIPs:
          - ${JELLYFIN_IP}
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: *port
    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/appName: "Jellyfin"
          hajimari.io/info: "Media library"
          hajimari.io/icon: "play-network"
          hajimari.io/targetBlank: "true"
        hosts:
          - host: &host "jellyfin.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      transcode:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /transcode
      cache:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /cache
      movies:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media-movies
        globalMounts:
          - path: /data/movies
      movies-unvalidated:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media-movies-unvalidated
        globalMounts:
          - path: /data/movies-unvalidated
      shows:
        existingClaim: media-shows
        globalMounts:
          - path: /data/shows
